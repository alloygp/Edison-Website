<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 80 90" fill="none">
  <!-- Graduation cap board (mortarboard top) -->
  <rect x="10" y="9" width="60" height="7" rx="2" fill="#1B2A4A"/>
  <!-- Cap crown -->
  <rect x="26" y="3" width="28" height="9" rx="2" fill="#1B2A4A"/>
  <!-- Tassel string -->
  <line x1="68" y1="16" x2="72" y2="26" stroke="#1B2A4A" stroke-width="2" stroke-linecap="round"/>
  <!-- Tassel end -->
  <circle cx="72" cy="28" r="2.5" fill="#1B2A4A"/>

  <!-- Lightbulb globe outline -->
  <path d="M40 18 C26 18 16 27 16 39 C16 48 21 55 28 59 L28 67 C28 69.2 29.8 71 32 71 L48 71 C50.2 71 52 69.2 52 67 L52 59 C59 55 64 48 64 39 C64 27 54 18 40 18Z" stroke="#1B2A4A" stroke-width="3.5" fill="none"/>

  <!-- Teal horizontal rays -->
  <line x1="2" y1="41" x2="16" y2="41" stroke="#3CC8C8" stroke-width="3" stroke-linecap="round"/>
  <line x1="64" y1="41" x2="78" y2="41" stroke="#3CC8C8" stroke-width="3" stroke-linecap="round"/>

  <!-- House roof (chevron) inside bulb -->
  <polyline points="23,46 40,31 57,46" stroke="#3CC8C8" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" fill="none"/>

  <!-- House window (2x2 grid) -->
  <rect x="32" y="48" width="16" height="13" rx="1" stroke="#3CC8C8" stroke-width="2.5" fill="none"/>
  <line x1="40" y1="48" x2="40" y2="61" stroke="#3CC8C8" stroke-width="2"/>
  <line x1="32" y1="54.5" x2="48" y2="54.5" stroke="#3CC8C8" stroke-width="2"/>

  <!-- Bulb base threads -->
  <line x1="30" y1="71" x2="50" y2="71" stroke="#1B2A4A" stroke-width="3" stroke-linecap="round"/>
  <line x1="31" y1="77" x2="49" y2="77" stroke="#1B2A4A" stroke-width="3" stroke-linecap="round"/>
  <line x1="33" y1="83" x2="47" y2="83" stroke="#1B2A4A" stroke-width="3" stroke-linecap="round"/>
</svg>
